<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oumoukelthoum Sidenna</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="nyan-stars" class="nyan-stars" aria-hidden="true"></div>
    <div class="nyan-flight" aria-hidden="true">
        <img
            class="nyan-cat"
            src="https://particles.js.org/images/nyancat.gif"
            alt=""
            referrerpolicy="no-referrer"
        >
    </div>

    <section class="hero">
        <div class="avatar-wrapper">
            <img src="image.png" alt="Oumoukelthoum Sidenna">
        </div>
        <div class="cards-row">
            <div class="card">
                <div class="t-bar">
                    <span class="t-dot red"></span>
                    <span class="t-dot yellow"></span>
                    <span class="t-dot green"></span>
                    <span class="t-title">~</span>
                </div>
                <div class="t-body">
                    <div class="t-line">
                        <span class="p-sign">$ </span>
                        <span class="p-cmd"><span class="cmd-keyword">whoami</span></span>
                    </div>
                    <span class="out">> Oumoukelthoum Sidenna</span>
                    <div class="t-line">
                        <span class="p-sign">$ </span>
                        <span class="p-cmd">
                            <span class="cmd-keyword">read</span>
                            <span class="cmd-option">-p</span>
                            <span class="cmd-string">"What is your profession? "</span>
                            <span class="cmd-var">profession</span>
                        </span>
                    </div>
                    <span class="out">> ML engineer and lecturer</span>
                    <div class="t-line t-prompt-line"><span class="p-sign">$ </span><span class="cursor"></span></div>
                </div>
            </div>

            <div class="linkedin-section">
                <a href="https://www.linkedin.com/in/oumoukelthoum-sidenna-398815235/" target="_blank" class="linkedin-btn" id="linkedin-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                    </svg>
                </a>
                <svg class="confetti-hint" width="220" height="52" viewBox="0 0 220 52" aria-hidden="true">
                    <defs>
                        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto" markerUnits="userSpaceOnUse">
                            <path d="M 0 0 L 8 3 L 0 6 Z" fill="#9ca3af"/>
                        </marker>
                    </defs>
                    <path d="M 108 20 C 82 36, 46 42, 10 28" stroke="#9ca3af" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
                    <text x="215" y="16" font-size="11" font-style="italic" font-family="'Segoe UI', Arial, sans-serif" fill="#9ca3af" text-anchor="end">if you press confetti will come!</text>
                </svg>
            </div>
        </div>
    </section>

    <script src="nyan.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script>
        document.getElementById("linkedin-btn").addEventListener("click", function() {
            const colors = ["#ff0000","#ff7f00","#ffff00","#00cc00","#0055ff","#8b00ff","#ff69b4","#00e5ff"];
            const end = Date.now() + 3000;
            (function burst() {
                confetti({ particleCount: 8, angle: 60,  spread: 65, origin: { x: 0 }, colors });
                confetti({ particleCount: 8, angle: 120, spread: 65, origin: { x: 1 }, colors });
                if (Date.now() < end) requestAnimationFrame(burst);
            })();
        });
    </script>

</body>
</html>
